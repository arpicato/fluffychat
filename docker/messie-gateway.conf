server {
    listen 9090;
    server_name _;

    client_max_body_size 50m;

    # Matrix well-known
    location /.well-known/matrix/client {
        default_type application/json;
        return 200 '{"m.homeserver":{"base_url":"https://messie.arpinfidel.com"}}';
        add_header Access-Control-Allow-Origin *;
    }

    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server":"messie.arpinfidel.com:443"}';
        add_header Access-Control-Allow-Origin *;
    }

    # Matrix homeserver
    location /_matrix {
        proxy_pass http://host.docker.internal:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Messie backend API
    location /api {
        proxy_pass http://host.docker.internal:18080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FluffyChat web app (default)
    location / {
        proxy_pass http://host.docker.internal:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
