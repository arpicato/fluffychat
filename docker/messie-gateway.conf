server {
    listen 9090;
    server_name _;
    resolver 127.0.0.11 ipv6=off;

    client_max_body_size 50m;

    # Matrix well-known
    location /.well-known/matrix/client {
        default_type application/json;
        return 200 '{"m.homeserver":{"base_url":"https://messie.arpinfidel.com"}}';
        add_header Access-Control-Allow-Origin *;
    }

    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server":"messie.arpinfidel.com:443"}';
        add_header Access-Control-Allow-Origin *;
    }

    # Matrix homeserver
    location /_matrix {
        proxy_pass http://192.168.65.254:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Messie backend API — strip /api prefix, backend nginx already routes /api
    location /api/ {
        proxy_pass http://192.168.65.254:18080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FluffyChat web app (default)
    location / {
        proxy_pass http://192.168.65.254:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
